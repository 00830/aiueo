<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>ログイン</title></head>
<body>
    <h1>ログインしてください。</h1>


    <form action="{% url 'app1:login' %}" method="POST">
        {% csrf_token %}
        <table border="1">
            <tr>
                <td>会員ID:</td>
                <td><input type="text" name="user_id"></td>
            </tr>
            <tr>
                <td>パスワード:</td>
                <td><input type="password" name="password"></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align:center"><input type="submit" value="ログイン"/></td>
            </tr>
        </table>
    </form>

    <a href="{% url 'app1:registerUser' %}">会員登録へ</a>
</body>
</html>
