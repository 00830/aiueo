{% load static %}
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>会員登録</title><link rel="stylesheet" href="{% static 'app1/style.css' %}"></head>
<body>
    <h1>会員情報を入力してください。</h1>

    <form action="{% url 'app1:registerUserConfirm' %}" method="POST">
        {% csrf_token %}
        <table border="1">
            {{ form.as_table }}
            <tr>
                <td colspan="2" style="text-align:center">
                    <input type="submit" value="登録確認"/>
                </td>
            </tr>
        </table>
    </form>

    <a href="{% url 'app1:main' %}">商品検索へ</a>
</body>
</html>
