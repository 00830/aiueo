{% load static %}
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>ショッピングカート</title><link rel="stylesheet" href="{% static 'app1/style.css' %}"></head>
<body>
    <h1>ショッピングカート内の商品一覧</h1>

    <table border="1">
        <tr>
            <th>商品名</th>
            <th>商品の色</th>
            <th>メーカー名</th>
            <th>単価</th>
            <th>数量</th>
        </tr>
        {% for c in cart_items %}
        <tr>
            <td>{{ c.item.name }}</td>
            <td>{{ c.item.color }}</td>
            <td>{{ c.item.manufacturer }}</td>
            <td>{{ c.item.price }}円</td>
            <td>{{ c.amount }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5">カートに商品がありません。</td></tr>
        {% endfor %}
    </table>

    合計金額: {{ total }}円<br>

    <form action="#" method="POST">
        {% csrf_token %}
        <input type="submit" value="購入する">
    </form>

    <br><br>

    <a href="{% url 'app1:main' %}">商品検索へ</a>
</body>
</html>
